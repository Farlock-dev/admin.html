<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin – Poke Fish</title>
    <style>
        :root {
            --gold: #FFD966;
            --bg-dark: #1a0f08;
            --panel-bg: #2c1f14;
            --border: #5C3E2C;
        }
        * { margin: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: #eee;
            padding: 20px;
        }
        h1 { color: var(--gold); text-align: center; margin-bottom: 30px; }
        .container { max-width: 900px; margin: 0 auto; }
        .login-box, .panel {
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .login-box h2 { margin-bottom: 20px; }
        input, button {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 6px; border: 1px solid var(--border);
            background: #2a1f14; color: #eee; font-size: 14px;
        }
        button {
            background: var(--gold);
            color: #1a0f08;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { opacity: 0.9; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #3a2e1c; color: var(--gold); padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #444; }
        .actions button { width: auto; padding: 6px 14px; margin: 0 4px; }
        .copy-btn {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            margin-left: 5px;
        }
        .copy-btn:hover { background: var(--gold); color: #000; }
        .msg { color: #ff6b6b; margin-top: 8px; }
        .logout { text-align: right; margin-bottom: 10px; }
        .logout a { color: #ff6b6b; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎣 Poke Fish – Painel Admin</h1>

        <!-- Tela de login -->
        <div id="loginScreen" class="login-box">
            <h2>Login Administrativo</h2>
            <input type="text" id="loginUser" placeholder="Usuário">
            <input type="password" id="loginPass" placeholder="Senha">
            <button onclick="doLogin()">Entrar</button>
            <div id="loginMsg" class="msg"></div>
        </div>

        <!-- Painel (inicialmente oculto) -->
        <div id="adminPanel" class="panel hidden">
            <div class="logout"><a onclick="logout()">Sair</a></div>
            <h2>Transações Pendentes</h2>
            <button onclick="loadTransactions()">Atualizar</button>
            <table id="txTable">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Tipo</th>
                        <th>Detalhes</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="panelMsg" class="msg"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://pokefish-backend-production.up.railway.app/api';
        let token = '';

        async function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const msg = document.getElementById('loginMsg');
            if (!username || !password) {
                msg.textContent = 'Preencha todos os campos.';
                return;
            }
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Erro no login');

                // Verifica se é admin (pelo payload do token)
                const payload = JSON.parse(atob(data.token.split('.')[1]));
                if (payload.role !== 'admin') {
                    throw new Error('Acesso negado. Apenas administradores.');
                }
                token = data.token;
                localStorage.setItem('admin_token', token);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadTransactions();
            } catch (err) {
                msg.textContent = err.message;
            }
        }

        async function loadTransactions() {
            const msg = document.getElementById('panelMsg');
            msg.textContent = '';
            try {
                const res = await fetch(`${API_URL}/admin/transactions`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }
                const transactions = await res.json();
                const tbody = document.querySelector('#txTable tbody');
                tbody.innerHTML = '';
                if (transactions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Nenhuma transação pendente.</td></tr>';
                    return;
                }
                transactions.forEach(tx => {
                    const row = document.createElement('tr');
                    
                    // Monta detalhes com botão de copiar
                    let detailsHtml = '';
                    if (tx.type === 'deposit') {
                        detailsHtml = `TXID: <span id="tx-${tx._id}">${tx.txid ? tx.txid.substring(0,20)+'...' : 'N/A'}</span>
                            <button class="copy-btn" onclick="copyText('${tx._id}', 'txid')">📋 Copiar TXID</button>`;
                    } else {
                        detailsHtml = `Carteira: <span id="wallet-${tx._id}">${tx.wallet ? tx.wallet : 'N/A'}</span>
                            <button class="copy-btn" onclick="copyText('${tx._id}', 'wallet')">📋 Copiar</button>`;
                    }

                    row.innerHTML = `
                        <td>${tx.username}</td>
                        <td>${tx.type === 'deposit' ? 'Depósito' : 'Saque'}</td>
                        <td>${detailsHtml}</td>
                        <td>${tx.amountCoins} moedas ($${tx.amountUSD})</td>
                        <td class="actions">
                            <button onclick="approve('${tx._id}')" style="background:#4CAF50;color:white;">✅ Aprovar</button>
                            <button onclick="reject('${tx._id}')" style="background:#e74c3c;color:white;">❌ Rejeitar</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                msg.textContent = 'Erro ao carregar transações.';
            }
        }

        async function copyText(id, field) {
            let text = '';
            if (field === 'txid') {
                // Pega o texto do span do TXID (precisamos do texto completo, não apenas o exibido)
                // Como estamos mostrando apenas os primeiros 20 caracteres, vamos obter do objeto transação original
                // Mas não temos acesso direto ao objeto aqui. Vamos pegar do span que está resumido.
                // Melhor fazer uma requisição extra? Ou simplesmente copiar o que está visível? Vamos copiar o texto do span.
                text = document.getElementById(`tx-${id}`).textContent;
                // Remove os '...' se existirem
                text = text.replace('...', '');
            } else if (field === 'wallet') {
                text = document.getElementById(`wallet-${id}`).textContent;
            }
            try {
                await navigator.clipboard.writeText(text);
                alert('Copiado: ' + text);
            } catch (err) {
                alert('Erro ao copiar. Copie manualmente: ' + text);
            }
        }

        async function approve(id) {
            const msg = document.getElementById('panelMsg');
            try {
                const res = await fetch(`${API_URL}/admin/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ transactionId: id, action: 'approved' })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Erro ao processar');
                msg.textContent = 'Transação aprovada!';
                loadTransactions();
            } catch (err) {
                msg.textContent = err.message;
            }
        }

        async function reject(id) {
            const msg = document.getElementById('panelMsg');
            try {
                const res = await fetch(`${API_URL}/admin/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ transactionId: id, action: 'rejected' })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Erro ao processar');
                msg.textContent = 'Transação rejeitada.';
                loadTransactions();
            } catch (err) {
                msg.textContent = err.message;
            }
        }

        function logout() {
            token = '';
            localStorage.removeItem('admin_token');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginMsg').textContent = '';
            document.getElementById('panelMsg').textContent = '';
        }

        // Auto-login se já houver token
        (function() {
            const savedToken = localStorage.getItem('admin_token');
            if (savedToken) {
                token = savedToken;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadTransactions();
            }
        })();
    </script>
</body>
</html>
